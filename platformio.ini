[env:lilygo-t-display-s3]
; Auf Major 6 gepinnt: ein künftiges espressif32 7.x (neuer Arduino-Core)
; soll den Build nicht ungefragt brechen — Upgrade dann bewusst.
platform = espressif32 @ ^6
board = lilygo-t-display-s3
framework = arduino

monitor_speed = 115200

lib_deps =
    sauloverissimo/ESP32_Host_MIDI @ ^7.0.0
    lovyan03/LovyanGFX @ ^1.2.25
    lathoub/AppleMIDI @ ^3.3.0
    tzapu/WiFiManager @ ^2.0.17

; Formatierung: pio run -t format  (nutzt .clang-format)
extra_scripts = pre:scripts/format.py

; Statische Analyse: pio check
check_tool = cppcheck
check_flags =
    cppcheck: --enable=warning,style --inline-suppr --suppress=unusedFunction --suppress=*:*/.platformio/* --suppress=*:*/.pio/*
check_src_filters =
    +<src/>
    +<include/>

build_unflags =
    -std=gnu++11

build_flags =
    -std=gnu++17